services:
  - type: web
    name: omie-etl-dashboard
    env: python
    rootDir: python_etl
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        value: db.jcposydvpilkvszbjxlo.supabase.co
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      # Segredos: NAO versionar valor. Definir no painel do Render (Environment).
      - key: DB_PASSWORD
        sync: false
      - key: ETL_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: CONCURRENCY_LIMIT
        value: "3"
